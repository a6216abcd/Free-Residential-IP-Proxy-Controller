name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CF_API_TOKEN: ${{ vars.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Check or Create D1 Database
        id: d1_id
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        run: |
          echo "开始查找数据库 'proxy_db' 并获取ID"
          D1_ID=$(wrangler d1 list --json 2>/dev/null | jq -r '.[] | select(.name=="proxy_db") | .uuid' 2>/dev/null || echo "")
          
          if [ -z "$D1_ID" ]; then
            echo "数据库 'proxy_db' 不存在, 正在创建..."
            CREATE_OUTPUT=$(wrangler d1 create proxy_db)
            D1_ID=$(echo "$CREATE_OUTPUT" | grep -oE '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' | head -n 1)
            echo "✅ 数据库 'proxy_db' 创建成功，ID: $D1_ID"
          else
            echo "✅ 找到数据库 'proxy_db'，ID: $D1_ID"
          fi
          
          if [ -z "$D1_ID" ]; then
            echo "❌ 错误: 未能获取到 D1 数据库 ID！"
            exit 1
          fi
          
          echo "D1_ID=$D1_ID" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        run: |
          wrangler deploy src/index.js
          echo "✅ Worker deployed successfully to Cloudflare"
